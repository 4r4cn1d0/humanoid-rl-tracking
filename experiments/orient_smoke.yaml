# Short smoke: orientation + MPS + 2 parallel envs
train:
  seed: 0
  total_timesteps: 8192
  verbose: 1
  device: mps
  n_envs: 2
  tensorboard_log: ./ppo_tracking_tensorboard/
  model_save_path: ppo_orient_smoke
  ppo:
    policy: MultiInputPolicy
    learning_rate: 0.0003
    n_steps: 1024
    batch_size: 128
    gamma: 0.99

env:
  trajectory: circle
  control_dt: 0.03
  max_episode_steps: 120
  track_orientation: true

reward:
  w_track: 1.0
  w_smooth: 0.1
  w_orient: 0.2

robustness:
  obs_noise_std: 0.0
  action_noise_std: 0.0
  action_delay: 0

curriculum:
  enabled: false
