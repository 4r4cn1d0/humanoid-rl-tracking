# Heavy training on Apple Silicon (MPS): position + orientation tracking, long episodes, vectorized rollouts.
train:
  seed: 0
  total_timesteps: 1200000
  verbose: 1
  device: mps
  n_envs: 4
  tensorboard_log: ./ppo_tracking_tensorboard/
  model_save_path: ppo_m4_orient
  ppo:
    policy: MultiInputPolicy
    learning_rate: 0.00025
    n_steps: 4096
    batch_size: 512
    gamma: 0.99

env:
  trajectory: circle
  control_dt: 0.03
  max_episode_steps: 400
  track_orientation: true
  trajectory_kwargs:
    radius: 0.15
    speed: 1.0

reward:
  w_track: 1.0
  w_smooth: 0.12
  w_velocity: 0.02
  w_orient: 0.22
  use_squared_error: false

robustness:
  obs_noise_std: 0.0
  action_noise_std: 0.0
  action_delay: 0

curriculum:
  enabled: true
  stages:
    - start_timestep: 0
      trajectory_speed: 0.55
      obs_noise_std: 0.0
      action_noise_std: 0.0
      action_delay: 0
    - start_timestep: 400000
      trajectory_speed: 1.0
      obs_noise_std: 0.0
      action_noise_std: 0.0
      action_delay: 0
    - start_timestep: 800000
      trajectory_speed: 1.15
      obs_noise_std: 0.012
      action_noise_std: 0.02
      action_delay: 1
