# Default training experiment: Fetch reach + moving goal, PPO, optional curriculum.
train:
  seed: 0
  total_timesteps: 100000
  verbose: 1
  tensorboard_log: ./ppo_tracking_tensorboard/
  model_save_path: ppo_tracking_model
  ppo:
    policy: MultiInputPolicy
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 64
    gamma: 0.99

env:
  trajectory: circle
  control_dt: 0.03
  trajectory_kwargs:
    radius: 0.15
    speed: 1.0

reward:
  w_track: 1.0
  w_smooth: 0.1
  w_velocity: 0.0
  use_squared_error: false

robustness:
  obs_noise_std: 0.0
  action_noise_std: 0.0
  action_delay: 0

# Three-stage schedule: slow/clean -> faster -> noise + delay (sim-to-real knobs).
curriculum:
  enabled: true
  stages:
    - name: slow_clean
      start_timestep: 0
      trajectory_speed: 0.6
      obs_noise_std: 0.0
      action_noise_std: 0.0
      action_delay: 0
    - name: faster_clean
      start_timestep: 35000
      trajectory_speed: 1.0
      obs_noise_std: 0.0
      action_noise_std: 0.0
      action_delay: 0
    - name: harder_robust
      start_timestep: 70000
      trajectory_speed: 1.2
      obs_noise_std: 0.01
      action_noise_std: 0.02
      action_delay: 1
